name: Deploy CRM App to Hostinger KVM

on:
  push:
    branches:
      - main 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        env:
          VITE_AIRTABLE_BASE_ID: ${{ secrets.VITE_AIRTABLE_BASE_ID }}
          VITE_AIRTABLE_PAT: ${{ secrets.VITE_AIRTABLE_PAT }}
        run: npm run build

      - name: Deploy Build to VPS via SSH/SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOS }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          source: "dist/*"
          target: "/var/www/crm.argylemedicalstaffing.com"
          strip_components: 1
